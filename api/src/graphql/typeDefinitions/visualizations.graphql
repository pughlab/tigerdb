type CalendarHeatmapDatum @exclude {
    date: Date!
    count: Int!
}

type Query {
    projectsCalendarHeatmap(
        startDate: Date!
        endDate: Date!
    ): [CalendarHeatmapDatum!]!
        @cypher(
            statement: """
            MATCH (n:Project {isPublic: true})
            WITH n WHERE (date($startDate) <= date(n.createdOn) <= date($endDate))
            RETURN {date: date(n.createdOn), count: count(n)}
            """
        )
}