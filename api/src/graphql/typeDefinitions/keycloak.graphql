scalar Email

type KeycloakUser {
  keycloakUserID: ID!
  name: String!
  email: Email!
  # roles: [String]
}

input KeycloakUserInput {
  keycloakUserID: ID!
}

type Query {
  isAdmin: Boolean @hasRole(role: "admin")
  isCurator: Boolean @hasRole(role: "curator")
}

type Mutation {
    me: KeycloakUser @auth
}

extend type KeycloakUser @auth(
  rules: [{
      isAuthenticated: true,
    }]
)