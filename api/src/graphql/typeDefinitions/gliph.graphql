type GliphTCR {
    id: ID! @id
    cdr3b: String!
    v_gene: String
    j_gene: String
    sample: String
    source: String
    run: Run! @relationship(type: "HAS_RESULT", direction: IN)
}

extend type Run {
    gliphTCRs: [GliphTCR!]! @relationship(type: "HAS_RESULT", direction: OUT)
}

type GliphNode {
    id: ID!
    group: String!
    value: String
    label: String
    size: Int
    color: String
    source: String
}

type GliphLink {
    source: ID!
    target: ID!
    weight: Int
}

type GliphGraph {
    nodes: [GliphNode!]!
    links: [GliphLink!]!
}

input GliphGraphInput {
    runID: ID!
    minCommunitySize: Int,
    cdr3bContains: String,
    minDegree: Int,
}

type Query {
    gliphGraph(input: GliphGraphInput!): GliphGraph
}

type Mutation {
    importGliphResults(
        runID: ID!
        presignedURL: String!
    ): String
}
